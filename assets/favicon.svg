<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- v4: Baxter Solutions monogram (rebrand 2026-07-08, replaces the prior name-pun C+arrow mark).
       Parchment #FAF7F2 background, Warm Ink #1C1A16 "B" glyph, Marine #1A6B8A accent bar —
       same v3 palette, reusing the accent-bar motif already used on the OG card / nav border. -->
  <rect width="32" height="32" rx="5" fill="#FAF7F2"/>
  <!-- "B" glyph — bold serif, Warm Ink -->
  <text x="16" y="21"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="700"
        fill="#1C1A16"
        text-anchor="middle">B</text>
  <!-- Marine accent bar beneath the glyph -->
  <rect x="9" y="24" width="14" height="2.5" rx="1.25" fill="#1A6B8A"/>
</svg>
